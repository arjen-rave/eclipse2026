name: Send eclipse reminders

on:
  schedule:
    # Day-granularity reminders (day-7/day-3/day-1/day-of), not minute-precision —
    # two runs a day is plenty, and the script's catch-up logic tolerates a missed
    # or delayed run either way. Netherlands is CEST (UTC+2) throughout this window
    # (no DST transition before 12 Aug 2026), so:
    #   08:00 UTC = 10:00 Amsterdam — catches the "day-of, 10:00 local" reminder
    #   16:00 UTC = 18:00 Amsterdam — catches the day-7/day-3/day-1 evening reminders
    - cron: "0 8 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch: # manual trigger, for testing now and for an emergency resend on the day
    inputs:
      test_send:
        description: "Send a one-off test notification to every current subscriber. Does NOT touch sent-log.json — completely separate from the real reminder schedule, so this can be run as many times as needed without risk of marking a real reminder (e.g. Day-7) as already sent."
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Run reminder check
        working-directory: .github/scripts
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          TEST_SEND: ${{ inputs.test_send }}
        run: node send-reminders.js

      # Skipped entirely for a test send — test mode never touches sent-log.json or
      # subscriptions.json, so there's nothing to commit and no risk of a test run
      # accidentally marking a real reminder (e.g. Day-7) as already sent.
      - name: Commit updated reminder state, if anything changed
        if: ${{ inputs.test_send != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions.json sent-log.json
          git diff --staged --quiet || git commit -m "Update reminder state [skip ci]"
          git pull --rebase origin main
          git push origin main
