name: Send eclipse reminders

on:
  schedule:
    # Day-granularity reminders (day-7/day-3/day-1/day-of), not minute-precision —
    # two runs a day is plenty, and the script's catch-up logic tolerates a missed
    # or delayed run either way. Netherlands is CEST (UTC+2) throughout this window
    # (no DST transition before 12 Aug 2026), so:
    #   08:00 UTC = 10:00 Amsterdam — catches the "day-of, 10:00 local" reminder
    #   16:00 UTC = 18:00 Amsterdam — catches the day-7/day-3/day-1 evening reminders
    - cron: "0 8 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch: # manual trigger, for testing now and for an emergency resend on the day
    inputs:
      test_send:
        description: "Send a one-off test notification to every current subscriber. Does NOT touch sent-log.json — completely separate from the real reminder schedule, so this can be run as many times as needed without risk of marking a real reminder (e.g. Day-7) as already sent."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Run the REAL reminder/condition logic (respects simulate_date below) but never actually sends a push and never writes subscriptions.json/sent-log.json — just logs what it would have done. Safe to run repeatedly with any simulate_date."
        required: false
        type: boolean
        default: false
      simulate_date:
        description: "Only used with dry_run: pretend 'today' is this date (YYYY-MM-DD, Europe/Amsterdam) instead of the real current date — e.g. 2026-08-09 to test the Day-3 checklist-conditional skip before that date really arrives. Ignored if dry_run is false."
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: .github/scripts
        run: npm install

      - name: Run reminder check
        working-directory: .github/scripts
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          TEST_SEND: ${{ inputs.test_send }}
          DRY_RUN: ${{ inputs.dry_run }}
          SIMULATE_DATE: ${{ inputs.simulate_date }}
        run: node send-reminders.js

      # Skipped for a test send (which never touches these files) AND for a dry
      # run (which deliberately never writes them either) — nothing to commit in
      # either case, and no risk of a test/simulated run marking a real reminder
      # (e.g. Day-7) as already sent.
      - name: Commit updated reminder state, if anything changed
        if: ${{ inputs.test_send != true && inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add subscriptions.json sent-log.json
          git diff --staged --quiet || git commit -m "Update reminder state [skip ci]"
          git pull --rebase origin main
          git push origin main
